spring:
  application:
    name: Myeongrang-hoe
  datasource:
    # 로컬 데모 기본값은 메모리 H2를 사용합니다.
    # 파일 DB가 필요하면 DB_URL=jdbc:h2:file:./data/myeongrang;MODE=PostgreSQL;DB_CLOSE_DELAY=-1 로 실행하세요.
    url: ${DB_URL:jdbc:h2:mem:myeongrang-dev;MODE=PostgreSQL;DB_CLOSE_DELAY=-1}
    driver-class-name: org.h2.Driver
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true
      mail.smtp.ssl.trust: ${MAIL_HOST:smtp.gmail.com}
      mail.smtp.connectiontimeout: 8000
      mail.smtp.timeout: 8000
      mail.smtp.writetimeout: 8000
  servlet:
    multipart:
      max-file-size: 3MB
      max-request-size: 4MB

server:
  port: ${SERVER_PORT:8080}

# 실제 SMTP: 환경변수 MAIL_USERNAME / MAIL_PASSWORD (Gmail 앱 비밀번호 권장)
# MAIL_FROM 미설정 시 username 을 발신자로 사용합니다.
app:
  upload:
    dir: ${UPLOAD_DIR:./data/uploads}
  mail:
    from: ${MAIL_FROM:}
    # 메일 미전송(자격증명 없음/실패)일 때만 응답에 인증번호를 포함
    expose-code-when-undelivered: true
  auth:
    # true 이면 X-User-Email 헤더도 허용 (로컬 개발 편의)
    allow-email-header: true
  kakao:
    # 카카오 Developers > 앱 키 > REST API 키 (정적 지도/대표 이미지용)
    rest-key: ${KAKAO_REST_API_KEY:}
  ai:
    gemini:
      # Google AI Studio > API key. 없으면 기존 로컬 규칙 기반 분석으로 동작합니다.
      api-key: ${GEMINI_API_KEY:}
      model: ${GEMINI_MODEL:gemini-2.0-flash}


logging:
  level:
    org.hibernate.SQL: warn
    com.example.myeongranghoe: info
